<!-- blog/templates/blog/EditPost.html -->
{% extends 'blog/base.html' %}
{% block content %}

<div class="container" style="max-width:700px; margin-top:50px;">
    <h1>Edit Post</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" name="title" value="{{ post.title }}">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Content</label>
            <textarea class="form-control" name="content" rows="5">{{ post.content }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Topic</label>
            <input type="text" class="form-control" name="topic" value="{{post.topic}}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Existing Images</label>
            <div>
                {% for img in post.images.all %}
                    <div style="display:inline-block; margin:5px; position:relative;">
                        <img src="{{ img.image.url }}" style="max-width:150px; border:1px solid #ccc;">
                        <a href="{% url 'deleteimage' img.id %}" 
                           class="btn btn-sm btn-danger" 
                           style="position:absolute; top:0; right:0;" 
                           onclick="return confirm('Delete this image?');">X</a>
                    </div>
                {% endfor %}
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Add More Images</label>
            <input type="file" class="form-control" name="images" multiple>
        </div>
        
        <button type="submit" class="btn btn-primary">Update Post</button>
        <a href="{% url 'myposts' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
